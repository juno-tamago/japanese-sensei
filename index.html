<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>さくら先生 – 日本語会話AI</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;700&family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --sakura:   #E8A0B0;
      --deep:     #1a0a0f;
      --ink:      #2d1520;
      --paper:    #fdf6f0;
      --muted:    #8a6472;
      --accent:   #c94f6d;
      --bubble-ai:#fff5f7;
      --bubble-user:#2d1520;
    }

    body {
      background: var(--deep);
      color: var(--paper);
      font-family: 'Noto Sans JP', sans-serif;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── HEADER ── */
    header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 20px;
      background: var(--ink);
      border-bottom: 1px solid rgba(232,160,176,0.15);
      flex-shrink: 0;
    }

    .avatar {
      width: 52px; height: 52px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--sakura), var(--accent));
      display: flex; align-items: center; justify-content: center;
      font-size: 26px;
      flex-shrink: 0;
      box-shadow: 0 0 0 3px rgba(232,160,176,0.25);
      position: relative;
    }
    .avatar::after {
      content:'';
      position:absolute; inset:-4px;
      border-radius:50%;
      border:2px solid rgba(232,160,176,0.4);
      animation: pulse 2.4s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100%{ opacity:.4; transform:scale(1); }
      50%{ opacity:1; transform:scale(1.06); }
    }

    .header-info h1 {
      font-family: 'Noto Serif JP', serif;
      font-size: 17px; font-weight: 700;
      color: var(--paper);
    }
    .header-info p {
      font-size: 12px; color: var(--muted); margin-top: 2px;
    }

    .status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #4ade80;
      margin-left: auto;
      box-shadow: 0 0 6px #4ade80;
      animation: blink 1.8s ease-in-out infinite;
    }
    @keyframes blink {
      0%,100%{ opacity:1; } 50%{ opacity:.3; }
    }

    /* ── API KEY BANNER ── */
    #api-banner {
      background: rgba(201,79,109,0.15);
      border-bottom: 1px solid rgba(201,79,109,0.3);
      padding: 10px 20px;
      display: flex; align-items: center; gap: 10px;
      flex-shrink: 0;
    }
    #api-banner input {
      flex: 1;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(232,160,176,0.3);
      border-radius: 8px;
      padding: 7px 12px;
      color: var(--paper);
      font-size: 13px;
      font-family: monospace;
      outline: none;
    }
    #api-banner input:focus { border-color: var(--sakura); }
    #api-banner input::placeholder { color: var(--muted); }
    #save-key-btn {
      background: var(--accent);
      color: #fff;
      border: none; border-radius: 8px;
      padding: 7px 14px; font-size: 13px;
      cursor: pointer; font-weight: 700;
      white-space: nowrap;
    }
    #save-key-btn:hover { background: #b03558; }

    /* ── CHAT AREA ── */
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }
    #chat::-webkit-scrollbar { width: 4px; }
    #chat::-webkit-scrollbar-thumb { background: rgba(232,160,176,0.2); border-radius: 4px; }

    .msg {
      display: flex;
      gap: 10px;
      max-width: 80%;
      animation: fadeUp 0.3s ease;
    }
    @keyframes fadeUp {
      from{ opacity:0; transform:translateY(8px); }
      to{ opacity:1; transform:translateY(0); }
    }

    .msg.ai { align-self: flex-start; }
    .msg.user { align-self: flex-end; flex-direction: row-reverse; }

    .msg-avatar {
      width: 34px; height: 34px; border-radius: 50%;
      background: linear-gradient(135deg, var(--sakura), var(--accent));
      display: flex; align-items: center; justify-content: center;
      font-size: 17px; flex-shrink: 0;
    }
    .msg.user .msg-avatar {
      background: rgba(255,255,255,0.1);
    }

    .bubble {
      padding: 11px 15px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.7;
    }
    .msg.ai .bubble {
      background: var(--bubble-ai);
      color: var(--ink);
      border-bottom-left-radius: 4px;
    }
    .msg.user .bubble {
      background: var(--accent);
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .ruby-text { font-size: 11px; color: var(--muted); margin-top: 6px; }
    .correction { background: rgba(201,79,109,0.08); border-left: 3px solid var(--accent); padding: 8px 10px; border-radius: 0 8px 8px 0; margin-top: 8px; font-size: 13px; color: #7a3040; }

    /* typing indicator */
    .typing-bubble { display:flex; gap:5px; align-items:center; padding:14px 18px; }
    .typing-bubble span {
      width:7px; height:7px; border-radius:50%;
      background: var(--accent); opacity:.5;
      animation: bounce 1.2s ease-in-out infinite;
    }
    .typing-bubble span:nth-child(2){ animation-delay:.2s; }
    .typing-bubble span:nth-child(3){ animation-delay:.4s; }
    @keyframes bounce {
      0%,100%{ transform:translateY(0); opacity:.5; }
      50%{ transform:translateY(-5px); opacity:1; }
    }

    /* ── INPUT BAR ── */
    #input-bar {
      padding: 12px 16px;
      background: var(--ink);
      border-top: 1px solid rgba(232,160,176,0.12);
      display: flex;
      gap: 10px;
      align-items: flex-end;
      flex-shrink: 0;
    }

    #text-input {
      flex: 1;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(232,160,176,0.2);
      border-radius: 20px;
      padding: 10px 16px;
      color: var(--paper);
      font-size: 14px;
      font-family: 'Noto Sans JP', sans-serif;
      resize: none;
      max-height: 110px;
      outline: none;
      line-height: 1.5;
    }
    #text-input:focus { border-color: var(--sakura); }
    #text-input::placeholder { color: var(--muted); }

    .icon-btn {
      width: 42px; height: 42px; border-radius: 50%;
      border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 19px;
      flex-shrink: 0;
      transition: transform .15s, background .15s;
    }
    .icon-btn:active { transform: scale(.92); }

    #mic-btn {
      background: rgba(232,160,176,0.15);
      color: var(--sakura);
    }
    #mic-btn.recording {
      background: var(--accent);
      color: #fff;
      animation: micPulse 1s ease-in-out infinite;
    }
    @keyframes micPulse {
      0%,100%{ box-shadow:0 0 0 0 rgba(201,79,109,.5); }
      50%{ box-shadow:0 0 0 10px rgba(201,79,109,0); }
    }

    #send-btn {
      background: var(--accent);
      color: #fff;
    }
    #send-btn:hover { background: #b03558; }
    #send-btn:disabled { background: rgba(255,255,255,0.1); cursor:default; }

    /* ── MODE TABS ── */
    #mode-bar {
      display: flex;
      gap: 8px;
      padding: 8px 16px 0;
      background: var(--ink);
      flex-shrink: 0;
    }
    .mode-tab {
      padding: 5px 12px;
      border-radius: 20px;
      border: 1px solid rgba(232,160,176,0.2);
      background: transparent;
      color: var(--muted);
      font-size: 12px;
      cursor: pointer;
      font-family: 'Noto Sans JP', sans-serif;
      transition: all .2s;
    }
    .mode-tab.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    /* ── NOTICE ── */
    .notice {
      text-align:center; font-size:12px; color:var(--muted);
      padding: 6px 0;
    }
  </style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="avatar">🌸</div>
  <div class="header-info">
    <h1>さくら先生</h1>
    <p>日本語会話 AI・일본어 회화 AI 선생님</p>
  </div>
  <div class="status-dot" title="온라인"></div>
</header>

<!-- API KEY INPUT -->
<div id="api-banner">
  <input type="password" id="api-key-input" placeholder="Anthropic API 키를 입력하세요 (sk-ant-...)" />
  <button id="save-key-btn">저장</button>
</div>

<!-- MODE TABS -->
<div id="mode-bar">
  <button class="mode-tab active" data-mode="free">💬 자유 회화</button>
  <button class="mode-tab" data-mode="correct">✏️ 교정 모드</button>
  <button class="mode-tab" data-mode="vocab">📖 단어 학습</button>
  <button class="mode-tab" data-mode="jlpt">🎯 JLPT 연습</button>
</div>

<!-- CHAT -->
<div id="chat">
  <div class="notice">さくら선생님과 일본어로 대화해보세요 🌸</div>
</div>

<!-- INPUT BAR -->
<div id="input-bar">
  <button class="icon-btn" id="mic-btn" title="음성 입력">🎤</button>
  <textarea id="text-input" rows="1" placeholder="일본어 또는 한국어로 입력하세요…"></textarea>
  <button class="icon-btn" id="send-btn" title="전송">➤</button>
</div>

<script>
  // ── STATE ──
  let apiKey = localStorage.getItem('sakura_api_key') || '';
  let currentMode = 'free';
  let isRecording = false;
  let recognition = null;
  let isSending = false;
  let conversationHistory = [];

  const SYSTEM_PROMPTS = {
    free: `あなたは「さくら先生」という名前の優しくて明るい日本語の先生です。
학생은 한국인이며 일본어를 배우고 있습니다.
규칙:
- 학생이 일본어로 말하면 일본어로 자연스럽게 대화하며 이어가세요.
- 학생이 한국어로 물어보면 한국어로 친절하게 답하되, 관련 일본어 표현도 함께 알려주세요.
- 항상 따뜻하고 격려하는 톤으로 말하세요.
- 답변은 짧고 자연스럽게 (2~4문장 이내).`,

    correct: `あなたは「さくら先生」です。교정 모드입니다.
학생이 일본어 문장을 쓰면:
1. 틀린 부분이 있으면 친절하게 교정해주세요.
2. 왜 틀렸는지 한국어로 간단히 설명하세요.
3. 올바른 표현을 다시 제시하세요.
4. 칭찬도 잊지 마세요!
맞으면 "완벽해요! ✨"라고 칭찬하고 비슷한 표현을 추가로 알려주세요.`,

    vocab: `あなたは「さくら先生」です。단어 학습 모드입니다.
학생이 단어나 표현을 물어보면:
1. 뜻을 한국어로 알려주세요.
2. 히라가나 읽는 법을 알려주세요.
3. 예문을 1~2개 만들어주세요.
4. 비슷한 단어나 반대말도 알려주세요.
형식을 깔끔하게 정리해서 보여주세요.`,

    jlpt: `あなたは「さくら先生」です。JLPT 연습 모드입니다.
학생에게 JLPT 스타일 문제를 내주세요.
- 먼저 레벨을 물어보세요 (N5~N1).
- 문법 또는 어휘 문제를 한 문제씩 내주세요.
- 학생이 답하면 정답 여부와 해설을 한국어로 알려주세요.
- 다음 문제로 이어가세요.`
  };

  // ── API KEY ──
  if (apiKey) {
    document.getElementById('api-key-input').value = '••••••••••••••••';
  }

  document.getElementById('save-key-btn').addEventListener('click', () => {
    const val = document.getElementById('api-key-input').value.trim();
    if (val && val !== '••••••••••••••••') {
      apiKey = val;
      localStorage.setItem('sakura_api_key', val);
      document.getElementById('api-key-input').value = '••••••••••••••••';
      addMessage('ai', '안녕하세요! 저는 さくら선생님이에요 🌸\nAPI 키가 저장됐어요. 일본어로 대화를 시작해봐요!\n\nこんにちは！今日は何を勉強しますか？');
    }
  });

  // ── MODE TABS ──
  document.querySelectorAll('.mode-tab').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.mode-tab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentMode = btn.dataset.mode;
      conversationHistory = []; // 모드 바꾸면 대화 초기화
      const modeNames = { free:'자유 회화', correct:'교정 모드', vocab:'단어 학습', jlpt:'JLPT 연습' };
      addMessage('ai', `${modeNames[currentMode]} 모드로 바꿨어요! 🌸`);
    });
  });

  // ── CHAT HELPERS ──
  function addMessage(role, text) {
    const chat = document.getElementById('chat');
    const div = document.createElement('div');
    div.className = `msg ${role}`;

    const avatarDiv = document.createElement('div');
    avatarDiv.className = 'msg-avatar';
    avatarDiv.textContent = role === 'ai' ? '🌸' : '🧑';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = text.replace(/\n/g, '<br>');

    div.appendChild(avatarDiv);
    div.appendChild(bubble);
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    return div;
  }

  function showTyping() {
    const chat = document.getElementById('chat');
    const div = document.createElement('div');
    div.className = 'msg ai';
    div.id = 'typing-indicator';
    div.innerHTML = `<div class="msg-avatar">🌸</div><div class="bubble"><div class="typing-bubble"><span></span><span></span><span></span></div></div>`;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  }

  function removeTyping() {
    const el = document.getElementById('typing-indicator');
    if (el) el.remove();
  }

  // ── SEND MESSAGE ──
  async function sendMessage(userText) {
    if (!userText.trim() || isSending) return;
    if (!apiKey) {
      addMessage('ai', '⚠️ 먼저 API 키를 입력해주세요!');
      return;
    }

    isSending = true;
    document.getElementById('send-btn').disabled = true;
    addMessage('user', userText);

    conversationHistory.push({ role: 'user', content: userText });

    showTyping();

    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-6',
          max_tokens: 1000,
          system: SYSTEM_PROMPTS[currentMode],
          messages: conversationHistory
        })
      });

      const data = await res.json();

      if (data.error) {
        removeTyping();
        addMessage('ai', `❌ 오류: ${data.error.message}`);
      } else {
        const reply = data.content[0].text;
        conversationHistory.push({ role: 'assistant', content: reply });
        removeTyping();
        addMessage('ai', reply);
        speakText(reply);
      }
    } catch (e) {
      removeTyping();
      addMessage('ai', '❌ 연결 오류가 발생했어요. API 키와 인터넷 연결을 확인해주세요.');
    }

    isSending = false;
    document.getElementById('send-btn').disabled = false;
  }

  // ── SEND BUTTON & ENTER KEY ──
  document.getElementById('send-btn').addEventListener('click', () => {
    const input = document.getElementById('text-input');
    const text = input.value.trim();
    input.value = '';
    input.style.height = 'auto';
    sendMessage(text);
  });

  document.getElementById('text-input').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      document.getElementById('send-btn').click();
    }
  });

  document.getElementById('text-input').addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 110) + 'px';
  });

  // ── TTS (일본어 음성 출력) ──
  function speakText(text) {
    if (!window.speechSynthesis) return;
    // 한국어 괄호 설명 제거 후 일본어만 읽기
    const cleaned = text.replace(/（[^）]*）/g, '').replace(/\([^)]*\)/g, '');
    const utter = new SpeechSynthesisUtterance(cleaned);

    const voices = window.speechSynthesis.getVoices();
    const jaVoice = voices.find(v => v.lang.startsWith('ja'));
    if (jaVoice) utter.voice = jaVoice;

    utter.lang = 'ja-JP';
    utter.rate = 0.9;
    utter.pitch = 1.1;
    window.speechSynthesis.speak(utter);
  }

  // voices 로딩 대기
  window.speechSynthesis.onvoiceschanged = () => {};

  // ── STT (음성 입력) ──
  const micBtn = document.getElementById('mic-btn');

  if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    recognition = new SR();
    recognition.lang = 'ja-JP';
    recognition.continuous = false;
    recognition.interimResults = false;

    recognition.onresult = e => {
      const text = e.results[0][0].transcript;
      document.getElementById('text-input').value = text;
      sendMessage(text);
    };
    recognition.onend = () => {
      isRecording = false;
      micBtn.classList.remove('recording');
      micBtn.textContent = '🎤';
    };
    recognition.onerror = () => {
      isRecording = false;
      micBtn.classList.remove('recording');
      micBtn.textContent = '🎤';
    };

    micBtn.addEventListener('click', () => {
      if (isRecording) {
        recognition.stop();
      } else {
        recognition.lang = currentMode === 'jlpt' ? 'ja-JP' : 'ja-JP';
        recognition.start();
        isRecording = true;
        micBtn.classList.add('recording');
        micBtn.textContent = '⏹';
      }
    });
  } else {
    micBtn.title = '이 브라우저는 음성 인식을 지원하지 않아요';
    micBtn.style.opacity = '0.4';
    micBtn.style.cursor = 'default';
  }
</script>
</body>
</html>
